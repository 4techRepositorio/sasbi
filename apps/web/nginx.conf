# Proxy para a API. X-Forwarded-For encadeado ($proxy_add_x_forwarded_for) permite à API usar o IP real
# do cliente em slowapi quando RATE_LIMIT_TRUST_PROXY=true (ver docs/ARCHITECTURE.md).
upstream fourpro_api {
    server api:8000;
}

server {
    listen 8081;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://fourpro_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /health {
        return 204;
    }
}
