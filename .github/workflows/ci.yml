# Frente QA — quality gates (TICKET-014). Requer secrets apenas se publicar artefactos.
# Paridade local: ./scripts/run-qa-gates.sh

name: CI

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python deps
        run: python -m pip install -r requirements-dev.txt
      - name: Ruff check + format (apps/api)
        run: |
          python -m ruff check apps/api/fourpro_api apps/api/tests
          python -m ruff format --check apps/api/fourpro_api apps/api/tests
      - name: Pytest (apps/api/tests)
        run: python -m pytest apps/api/tests -q --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
          ACCESS_TOKEN_EXPIRE_MINUTES: "15"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"

  # Garante que a cadeia Alembic aplica em Postgres vazio (paridade com deploy Docker/Portainer).
  alembic-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fourpro
          POSTGRES_PASSWORD: fourpro_ci_test
          POSTGRES_DB: fourpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fourpro -d fourpro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python deps
        run: python -m pip install -r requirements-dev.txt
      - name: Alembic heads (revisão única)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg2://fourpro:fourpro_ci_test@localhost:5432/fourpro
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-for-alembic-only
        run: |
          set -euo pipefail
          LINES=$(python -m alembic heads 2>/dev/null | sed '/^\s*$/d' | wc -l | tr -d ' ')
          if [ "$LINES" != "1" ]; then
            echo "Esperado exactamente 1 head Alembic, obtido: $LINES"
            python -m alembic heads
            exit 1
          fi
      - name: Alembic upgrade head (Postgres limpo)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg2://fourpro:fourpro_ci_test@localhost:5432/fourpro
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-for-alembic-only
        run: python -m alembic upgrade head

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: TypeScript check
        run: npm run typecheck
      - name: npm run build
        run: npm run build

  e2e-api-smoke-local:
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/reusable-e2e-api-smoke.yml
    with:
      artifact-name: e2e-api-smoke-debug
      artifact-retention-days: 3
