# Cria labels de triagem usadas pelos templates de issue (idempotente: 422 = já existe).
# Actions → este workflow → Run workflow (uma vez após o primeiro push com templates).

name: Sync issue labels

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Algo não funciona como esperado' },
              { name: 'triage', color: 'ededed', description: 'Precisa triagem inicial' },
              { name: 'enhancement', color: 'a2eeef', description: 'Nova funcionalidade ou melhoria' },
            ];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            for (const l of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: l.name,
                  color: l.color.replace(/^#/, ''),
                  description: l.description,
                });
                core.info(`Created: ${l.name}`);
              } catch (e) {
                if (e.status === 422) {
                  core.info(`Skip (exists or validation): ${l.name}`);
                } else {
                  throw e;
                }
              }
            }
