[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fourpro-shared"
version = "0.1.0"
description = "4Pro_BI — utilitários partilhados"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openpyxl>=3.1.5",
    "xlrd>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["fourpro_shared"]
