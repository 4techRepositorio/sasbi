services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fourpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-K8mpQ4wxN2vR7sFourProBIdev2026}
      POSTGRES_DB: ${POSTGRES_DB:-fourpro}
    ports:
      # Host 15432 por defeito: evita colisão com Postgres local na 5432.
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - fourpro_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fourpro} -d ${POSTGRES_DB:-fourpro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host 16379 por defeito: evita colisão com Redis/serviços na 6379 do host.
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - fourpro_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fourpro}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-M9nqR5syO3tS8uFourProMinio2026}
    ports:
      # Host 17291/17292 por defeito: evita choque com outro MinIO/S3 no host.
      - "${MINIO_PORT:-17291}:9000"
      - "${MINIO_CONSOLE_PORT:-17292}:9001"
    volumes:
      - fourpro_minio:/data

volumes:
  fourpro_pg:
  fourpro_redis:
  fourpro_minio:
