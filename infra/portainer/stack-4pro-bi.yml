# Stack única Portainer — dados + aplicação (recomendado).
# No Portainer: Stacks → Add stack → Web editor / Git — cole este YAML.
# Build: exige repositório completo como contexto (raiz do 4Pro_BI).
#
# Variáveis: infra/portainer/.env — host: API 6418, MinIO 7291/7292, Web 8081 (sem 8000/9000 no host).
# No Stack Editor do Portainer: defina o nome da stack como «4Pro_BI» ou «fourpro-bi» (evita prefixo «portainer» nos containers).
name: fourpro-bi

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fourpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-K8mpQ4wxN2vR7sFourProBIdev2026}
      POSTGRES_DB: ${POSTGRES_DB:-fourpro}
    volumes:
      - fourpro_pg:/var/lib/postgresql/data
    networks:
      - fourpro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fourpro} -d ${POSTGRES_DB:-fourpro}"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    volumes:
      - fourpro_redis:/data
    networks:
      - fourpro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 8

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fourpro}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-M9nqR5syO3tS8uFourProMinio2026}
    volumes:
      - fourpro_minio:/data
    networks:
      - fourpro
    ports:
      - "${MINIO_PUBLISH_9000:-7291}:9000"
      - "${MINIO_PUBLISH_9001:-7292}:9001"

  api:
    build:
      # Relativo a infra/portainer/ quando o ficheiro está nessa pasta
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-fourpro}:${POSTGRES_PASSWORD:-K8mpQ4wxN2vR7sFourProBIdev2026}@postgres:5432/${POSTGRES_DB:-fourpro}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-fourpro-bi-dev-jwt-hs256-2026-substituir-em-producao-64chars___}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_MB: "50"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: INFO
      RUN_SEED: ${RUN_SEED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081}
    volumes:
      - fourpro_uploads:/data/uploads
    networks:
      - fourpro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PUBLISH:-6418}:8000"

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-fourpro}:${POSTGRES_PASSWORD:-K8mpQ4wxN2vR7sFourProBIdev2026}@postgres:5432/${POSTGRES_DB:-fourpro}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-fourpro-bi-dev-jwt-hs256-2026-substituir-em-producao-64chars___}
      UPLOAD_DIR: /data/uploads
      LOG_LEVEL: INFO
    volumes:
      - fourpro_uploads:/data/uploads
    networks:
      - fourpro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    networks:
      - fourpro
    depends_on:
      - api
    ports:
      - "${WEB_PUBLISH:-8081}:8081"

networks:
  fourpro:
    driver: bridge

volumes:
  fourpro_pg:
  fourpro_redis:
  fourpro_minio:
  fourpro_uploads:
